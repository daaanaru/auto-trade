<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析 - 投資部ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e2e8f0;
      --muted:     #718096;
      --green:     #48bb78;
      --red:       #fc8181;
      --yellow:    #f6ad55;
      --blue:      #63b3ed;
      --purple:    #b794f4;
      --accent:    #4299e1;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Pro Display', 'Hiragino Sans', 'Meiryo', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 16px;
    }
    a { color: var(--accent); text-decoration: none; }

    /* ===== ナビゲーション ===== */
    .nav-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      padding: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .nav-link {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .nav-link:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }
    .nav-link.active {
      background: var(--accent);
      color: #fff;
    }

    /* ===== ヘッダー ===== */
    header {
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 20px; font-weight: 700; }

    /* ===== カード ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .section-header h2 { font-size: 15px; font-weight: 600; }

    /* ===== チャートグリッド ===== */
    .chart-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) { .chart-grid-2 { grid-template-columns: 1fr; } }

    .chart-container {
      position: relative;
      width: 100%;
      height: 320px;
    }

    /* ===== ローディング ===== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 320px;
      color: var(--muted);
      font-size: 13px;
    }
    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      margin-left: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== フッター ===== */
    footer {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ===== ナビゲーション ===== -->
<nav class="nav-bar">
  <a href="/" class="nav-link">トップ</a>
  <a href="/strategies" class="nav-link">戦略解説</a>
  <a href="/analysis" class="nav-link active">分析</a>
</nav>

<!-- ===== ヘッダー ===== -->
<header>
  <h1>分析</h1>
</header>

<!-- ===== 資産推移 + リターン推移 ===== -->
<div class="chart-grid-2">
  <div class="card">
    <div class="section-header">
      <h2>資産推移（JPY）</h2>
    </div>
    <div id="asset-loading" class="loading">データ取得中</div>
    <div class="chart-container" id="asset-chart-wrap" style="display:none;">
      <canvas id="assetChart"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="section-header">
      <h2>リターン推移（%）</h2>
    </div>
    <div id="return-loading" class="loading">データ取得中</div>
    <div class="chart-container" id="return-chart-wrap" style="display:none;">
      <canvas id="returnChart"></canvas>
    </div>
  </div>
</div>

<!-- ===== 戦略別損益 + 市場別構成 ===== -->
<div class="chart-grid-2">
  <div class="card">
    <div class="section-header">
      <h2>戦略別損益（JPY）</h2>
    </div>
    <div id="strategy-loading" class="loading">データ取得中</div>
    <div class="chart-container" id="strategy-chart-wrap" style="display:none;">
      <canvas id="strategyChart"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="section-header">
      <h2>市場別ポジション構成</h2>
    </div>
    <div id="market-loading" class="loading">データ取得中</div>
    <div class="chart-container" id="market-chart-wrap" style="display:none;">
      <canvas id="marketChart"></canvas>
    </div>
  </div>
</div>

<footer>
  DaNARU 投資部ダッシュボード &mdash; 分析 &mdash; port 8090
</footer>

<script>
// ===== 共通Chart.js設定（ダークテーマ） =====
Chart.defaults.color = '#e2e8f0';
Chart.defaults.borderColor = '#2a2d3a';
Chart.defaults.font.family = "'SF Pro Display', 'Hiragino Sans', 'Meiryo', sans-serif";
Chart.defaults.font.size = 11;

const COLORS = {
  green: '#48bb78',
  red: '#fc8181',
  yellow: '#f6ad55',
  blue: '#63b3ed',
  purple: '#b794f4',
  accent: '#4299e1',
  muted: '#718096',
};

// 市場名→色マッピング
const MARKET_COLORS = {
  'us':     COLORS.purple,
  'jp':     COLORS.blue,
  'btc':    COLORS.yellow,
  'crypto': COLORS.yellow,
  'gold':   '#d69e2e',
  'fx':     '#ed64a6',
};

function showChart(loadingId, wrapId) {
  const l = document.getElementById(loadingId);
  const w = document.getElementById(wrapId);
  if (l) l.style.display = 'none';
  if (w) w.style.display = 'block';
}

function showError(loadingId, msg) {
  const l = document.getElementById(loadingId);
  if (l) {
    l.textContent = msg;
    l.classList.remove('loading');
    l.style.color = '#fc8181';
  }
}

// ===== 1. 資産推移グラフ =====
fetch('/api/history?limit=999')
  .then(r => r.json())
  .then(data => {
    if (!data || data.length === 0) {
      showError('asset-loading', '資産推移データなし');
      showError('return-loading', 'リターンデータなし');
      return;
    }

    const labels = data.map(d => {
      const ts = d.timestamp || '';
      return ts.slice(5, 16).replace('T', ' ');
    });
    const assetValues = data.map(d => d.total_value_jpy || 0);
    const returnValues = data.map(d => d.total_return_pct || 0);

    // 資産推移
    showChart('asset-loading', 'asset-chart-wrap');
    new Chart(document.getElementById('assetChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '総資産（JPY）',
          data: assetValues,
          borderColor: COLORS.accent,
          backgroundColor: 'rgba(66,153,225,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: data.length > 50 ? 0 : 2,
          pointHoverRadius: 4,
          borderWidth: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => '¥' + ctx.parsed.y.toLocaleString()
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#2a2d3a' },
            ticks: { maxTicksLimit: 10 }
          },
          y: {
            grid: { color: '#2a2d3a' },
            ticks: {
              callback: v => '¥' + v.toLocaleString()
            }
          }
        }
      }
    });

    // リターン推移
    showChart('return-loading', 'return-chart-wrap');
    const returnColors = returnValues.map(v => v >= 0 ? COLORS.green : COLORS.red);
    new Chart(document.getElementById('returnChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'リターン（%）',
          data: returnValues,
          borderColor: ctx => {
            const idx = ctx.dataIndex;
            if (idx === undefined) return COLORS.accent;
            return returnValues[idx] >= 0 ? COLORS.green : COLORS.red;
          },
          segment: {
            borderColor: ctx => {
              const v = ctx.p1.parsed.y;
              return v >= 0 ? COLORS.green : COLORS.red;
            }
          },
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: data.length > 50 ? 0 : 2,
          pointHoverRadius: 4,
          borderWidth: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ctx.parsed.y.toFixed(2) + '%'
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#2a2d3a' },
            ticks: { maxTicksLimit: 10 }
          },
          y: {
            grid: { color: '#2a2d3a' },
            ticks: {
              callback: v => v.toFixed(1) + '%'
            }
          }
        }
      }
    });
  })
  .catch(err => {
    showError('asset-loading', '取得エラー: ' + err.message);
    showError('return-loading', '取得エラー: ' + err.message);
  });

// ===== 2. 戦略別損益バーチャート =====
fetch('/api/strategies')
  .then(r => r.json())
  .then(data => {
    if (!data || data.length === 0) {
      showError('strategy-loading', '戦略データなし');
      return;
    }

    const labels = data.map(d => d.strategy);
    const values = data.map(d => d.total_pnl_jpy || 0);
    const bgColors = values.map(v => v >= 0 ? 'rgba(72,187,120,0.7)' : 'rgba(252,129,129,0.7)');
    const borderColors = values.map(v => v >= 0 ? COLORS.green : COLORS.red);

    showChart('strategy-loading', 'strategy-chart-wrap');
    new Chart(document.getElementById('strategyChart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: '損益（JPY）',
          data: values,
          backgroundColor: bgColors,
          borderColor: borderColors,
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => '¥' + ctx.parsed.x.toLocaleString()
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#2a2d3a' },
            ticks: {
              callback: v => '¥' + v.toLocaleString()
            }
          },
          y: {
            grid: { display: false },
          }
        }
      }
    });
  })
  .catch(err => {
    showError('strategy-loading', '取得エラー: ' + err.message);
  });

// ===== 3. 市場別ポジション構成ドーナツ =====
fetch('/api/portfolio')
  .then(r => r.json())
  .then(data => {
    if (!data || !data.positions || data.positions.length === 0) {
      showError('market-loading', 'ポジションデータなし');
      return;
    }

    // 市場別に集計
    const marketCounts = {};
    data.positions.forEach(p => {
      const m = p.market || 'other';
      marketCounts[m] = (marketCounts[m] || 0) + 1;
    });

    const labels = Object.keys(marketCounts);
    const values = Object.values(marketCounts);
    const bgColors = labels.map(m => {
      const c = MARKET_COLORS[m] || COLORS.muted;
      return c + 'cc'; // 80% opacity
    });
    const borderColors = labels.map(m => MARKET_COLORS[m] || COLORS.muted);

    // 市場名を日本語に
    const marketNames = {
      'us': '米国株',
      'jp': '日本株',
      'btc': 'BTC',
      'crypto': '仮想通貨',
      'gold': 'ゴールド',
      'fx': 'FX',
    };
    const displayLabels = labels.map(m => marketNames[m] || m);

    showChart('market-loading', 'market-chart-wrap');
    new Chart(document.getElementById('marketChart'), {
      type: 'doughnut',
      data: {
        labels: displayLabels,
        datasets: [{
          data: values,
          backgroundColor: bgColors,
          borderColor: borderColors,
          borderWidth: 2,
          hoverOffset: 8,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '55%',
        plugins: {
          legend: {
            position: 'right',
            labels: {
              padding: 16,
              usePointStyle: true,
              pointStyleWidth: 12,
            }
          },
          tooltip: {
            callbacks: {
              label: ctx => {
                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                const pct = ((ctx.parsed / total) * 100).toFixed(1);
                return ctx.label + ': ' + ctx.parsed + '件 (' + pct + '%)';
              }
            }
          }
        }
      }
    });
  })
  .catch(err => {
    showError('market-loading', '取得エラー: ' + err.message);
  });
</script>

</body>
</html>
